# ============================================
# Database Configuration
# ============================================
# Uses environment variables in Azure, falls back to local values for development
spring.datasource.url=${AZURE_SQL_URL:jdbc:sqlserver://localhost:1433;databaseName=AssignmentDB;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${AZURE_SQL_USERNAME:sa}
spring.datasource.password=${AZURE_SQL_PASSWORD:123}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================
# JPA Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Logging Configuration
# ============================================
logging.level.com.assignmentservice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# Server Configuration
# ============================================
server.port=${PORT:8080}

# ============================================
# Email Configuration (Gmail SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:ramirudewadar@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:rjgndomydzloybrs}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# IMPORTANT: Increase timeout settings significantly
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Additional settings for better reliability
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.transport.protocol=smtp

# Email protocol settings
spring.mail.protocol=smtp
spring.mail.test-connection=false

# ============================================
# Application Configuration
# ============================================
app.admin.email=${ADMIN_EMAIL:ramirudewadar@gmail.com}

# *** ENABLE EMAIL FOR PRODUCTION ***
app.email.enabled=true

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# File Upload Directory
# Azure uses /tmp, local uses uploads/
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/uploads/}

# Application URL
app.url=${APP_URL:http://localhost:8080}

# ============================================
# Revision Settings
# ============================================
# Default maximum revisions per assignment
app.revision.max-revisions=2

# Enable/disable revision feature
app.revision.enabled=true

# Email notification settings for revisions
app.revision.email.admin-notification=true
app.revision.email.user-confirmation=true
app.revision.email.completion-notification=true

# ============================================
# Performance Configuration
# ============================================
# Hibernate batch processing
spring.jpa.properties.hibernate.jdbc.batch_size=20

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============================================
# Notification Settings
# ============================================
app.notifications.enabled=true
app.notifications.auto-cleanup-days=30

# Email notification settings
spring.mail.notifications.enabled=true