<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Assignment Service</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --danger-color: #e74c3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(45deg, var(--primary-color), #2980b9);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .card-header i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.75rem;
        }

        .card-body {
            padding: 2rem;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 1.5rem;
            border-radius: 5px;
        }

        .info-box p {
            margin: 0;
            color: #1565c0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .alert {
            border: none;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-success {
            background: linear-gradient(45deg, #27ae60, #219652);
            color: white;
        }

        .alert-danger {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
        }

        .form-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), #2980b9);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #2980b9, var(--primary-color));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: linear-gradient(45deg, #7f8c8d, #95a5a6);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(149, 165, 166, 0.4);
        }

        .text-center {
            text-align: center;
        }

        .mt-3 {
            margin-top: 1rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-key-fill"></i>
            <h2>Forgot Password?</h2>
        </div>

        <div class="card-body">
            <div class="info-box">
                <p>
                    <i class="bi bi-info-circle"></i>
                    Enter your email address and we'll send you instructions to reset your password.
                </p>
            </div>

            <!-- Success Message -->
            <div th:if="${message}" class="alert alert-success">
                <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope"></i> Email Address
                    </label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           placeholder="Enter your registered email"
                           required>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send"></i> Send Reset Link
                </button>

                <a th:href="@{/login}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </form>

            <div class="text-center mt-3">
                <p style="font-size: 0.9rem; color: #6c757d;">
                    Remember your password? <a th:href="@{/login}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
