<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Assignment Service</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-body {
            padding: 3rem;
        }

        h1 {
            color: var(--secondary-color);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        h3, h5 {
            color: var(--secondary-color);
            margin-bottom: 1rem;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -15px;
        }

        .col-md-6 {
            flex: 0 0 50%;
            padding: 0 15px;
        }

        .mb-4 {
            margin-bottom: 2rem;
        }

        .mb-5 {
            margin-bottom: 3rem;
        }

        .contact-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 2rem;
            height: 100%;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .contact-card.success:hover {
            border-color: var(--success-color);
        }

        .display-4 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 10px 20px;
            border: 2px solid;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 1rem;
        }

        .btn-outline-primary {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: transparent;
        }

        .btn-outline-primary:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-success {
            border-color: var(--success-color);
            color: var(--success-color);
            background: transparent;
        }

        .btn-outline-success:hover {
            background: var(--success-color);
            color: white;
            transform: translateY(-2px);
        }

        .form-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), #2980b9);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            width: 100%;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #2980b9, var(--primary-color));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .text-center {
            text-align: center;
        }

        .text-muted {
            color: #6c757d;
        }

        .bi {
            display: block;
        }

        @media (max-width: 768px) {
            .col-md-6 {
                flex: 0 0 100%;
                margin-bottom: 1rem;
            }

            .card-body {
                padding: 2rem;
            }

            h1 {
                font-size: 2rem;
            }

            .display-4 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-body">
            <h1>Contact Us</h1>

            <div class="row mb-5">
                <div class="col-md-6">
                    <div class="contact-card">
                        <i class="bi bi-envelope display-4 text-primary"></i>
                        <h5>Email Support</h5>
                        <p class="text-muted">We respond within 24 hours</p>
                        <a href="mailto:support@assignmentservice.com" class="btn btn-outline-primary">
                            support@assignmentservice.com
                        </a>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="contact-card success">
                        <i class="bi bi-telephone display-4 text-success"></i>
                        <h5>Phone Support</h5>
                        <p class="text-muted">Mon-Fri, 9AM-6PM</p>
                        <a href="tel:+94112345678" class="btn btn-outline-success">
                            +94 112 345 678
                        </a>
                    </div>
                </div>
            </div>

            <h3 class="text-center mb-4">Get In Touch</h3>
            <form>
                <div class="row">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Your Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Your Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" class="form-control" id="subject" required>
                </div>
                <div class="mb-4">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-send"></i> Send Message
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const subject = document.getElementById('subject').value;
        const message = document.getElementById('message').value;

        if (name && email && subject && message) {
            alert('Thank you for your message! We will get back to you soon.');
            document.querySelector('form').reset();
        } else {
            alert('Please fill in all fields.');
        }
    });
</script>
</body>
</html>
