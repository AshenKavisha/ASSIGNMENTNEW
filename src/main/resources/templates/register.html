<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Assignment Service</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary-color: #3498db;
      --secondary-color: #2c3e50;
      --success-color: #27ae60;
      --danger-color: #e74c3c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card-body {
      padding: 2rem;
    }

    .card-title {
      color: var(--secondary-color);
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.75rem;
    }

    .alert {
      border: none;
      border-radius: 10px;
      padding: 12px 15px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-danger {
      background: linear-gradient(45deg, #e74c3c, #c0392b);
      color: white;
    }

    .alert-success {
      background: linear-gradient(45deg, #27ae60, #219652);
      color: white;
    }

    .alert-info {
      background: linear-gradient(45deg, #3498db, #2980b9);
      color: white;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      margin: 0 -10px;
    }

    .col-md-6 {
      flex: 0 0 50%;
      padding: 0 10px;
    }

    .form-label {
      font-weight: 600;
      color: var(--secondary-color);
      margin-bottom: 0.5rem;
      display: block;
    }

    .form-label .required {
      color: var(--danger-color);
      margin-left: 3px;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    .form-control.error {
      border-color: var(--danger-color);
    }

    .form-check {
      display: flex;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .form-check-input {
      margin-right: 10px;
      margin-top: 4px;
      cursor: pointer;
    }

    .form-check-label {
      font-size: 0.9rem;
      line-height: 1.5;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(45deg, var(--primary-color), #2980b9);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(45deg, #2980b9, var(--primary-color));
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .text-center {
      text-align: center;
    }

    .mt-3 {
      margin-top: 1rem;
    }

    a {
      color: var(--primary-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .bi {
      font-size: 1.1em;
    }

    .password-requirements {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      display: none;
    }

    .password-requirements.show {
      display: block;
    }

    .password-requirements ul {
      margin: 5px 0 0 0;
      padding-left: 20px;
    }

    .password-requirements li {
      color: #6c757d;
      margin: 3px 0;
    }

    .password-requirements li.valid {
      color: var(--success-color);
    }

    .password-requirements li i {
      margin-right: 5px;
    }

    .info-box {
      background: #e3f2fd;
      border-left: 4px solid var(--primary-color);
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .info-box p {
      margin: 0;
      color: #1565c0;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .col-md-6 {
        flex: 0 0 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-body">
      <h2 class="card-title">
        <i class="bi bi-person-plus"></i> Create Account
      </h2>

      <!-- Success message -->
      <div th:if="${message}" class="alert alert-success">
        <i class="bi bi-check-circle"></i>
        <span th:text="${message}"></span>
      </div>

      <!-- Error message -->
      <div th:if="${error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${error}"></span>
      </div>

      <!-- Info box about email verification -->
      <div class="info-box">
        <p>
          <i class="bi bi-info-circle"></i>
          <strong>Email Verification Required:</strong> After registration, you'll need to verify your email address before you can login.
        </p>
      </div>

      <form th:action="@{/register}" method="post" id="registrationForm">
        <div class="row">
          <div class="col-md-6">
            <label for="fullName" class="form-label">
              Full Name <span class="required">*</span>
            </label>
            <input type="text"
                   class="form-control"
                   id="fullName"
                   name="fullName"
                   placeholder="Enter your full name"
                   required
                   minlength="2">
          </div>

          <div class="col-md-6">
            <label for="email" class="form-label">
              Email <span class="required">*</span>
            </label>
            <input type="email"
                   class="form-control"
                   id="email"
                   name="email"
                   placeholder="your.email@example.com"
                   required
                   autocomplete="email">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <label for="password" class="form-label">
              Password <span class="required">*</span>
            </label>
            <input type="password"
                   class="form-control"
                   id="password"
                   name="password"
                   placeholder="Create a password"
                   required
                   minlength="6">
          </div>

          <div class="col-md-6">
            <label for="confirmPassword" class="form-label">
              Confirm Password <span class="required">*</span>
            </label>
            <input type="password"
                   class="form-control"
                   id="confirmPassword"
                   placeholder="Confirm your password"
                   required>
          </div>
        </div>

        <div class="password-requirements" id="passwordRequirements">
          <strong>Password Requirements:</strong>
          <ul>
            <li id="length-req">
              <i class="bi bi-circle"></i> At least 6 characters
            </li>
            <li id="match-req">
              <i class="bi bi-circle"></i> Passwords match
            </li>
          </ul>
        </div>

        <div class="form-check">
          <input type="checkbox"
                 class="form-check-input"
                 id="terms"
                 required>
          <label class="form-check-label" for="terms">
            I agree to the <a href="#" onclick="event.preventDefault()">Terms of Service</a>
            and <a href="#" onclick="event.preventDefault()">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <i class="bi bi-person-check"></i> Create Account
        </button>
      </form>

      <div class="text-center mt-3">
        <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
      </div>
    </div>
  </div>
</div>

<script>
  // Password validation
  const password = document.getElementById('password');
  const confirmPassword = document.getElementById('confirmPassword');
  const passwordRequirements = document.getElementById('passwordRequirements');
  const lengthReq = document.getElementById('length-req');
  const matchReq = document.getElementById('match-req');
  const submitBtn = document.getElementById('submitBtn');
  const form = document.getElementById('registrationForm');

  // Show requirements when focusing on password fields
  password.addEventListener('focus', () => {
    passwordRequirements.classList.add('show');
  });

  confirmPassword.addEventListener('focus', () => {
    passwordRequirements.classList.add('show');
  });

  function updateRequirementIcon(element, isValid) {
    const icon = element.querySelector('i');
    if (isValid) {
      element.classList.add('valid');
      icon.className = 'bi bi-check-circle-fill';
    } else {
      element.classList.remove('valid');
      icon.className = 'bi bi-circle';
    }
  }

  function validatePassword() {
    let isValid = true;

    // Check length
    const lengthValid = password.value.length >= 6;
    updateRequirementIcon(lengthReq, lengthValid);
    if (!lengthValid) isValid = false;

    // Check match
    const matchValid = password.value && confirmPassword.value &&
            password.value === confirmPassword.value;
    updateRequirementIcon(matchReq, matchValid);

    if (confirmPassword.value && !matchValid) {
      confirmPassword.classList.add('error');
      confirmPassword.setCustomValidity('Passwords do not match');
      isValid = false;
    } else {
      confirmPassword.classList.remove('error');
      confirmPassword.setCustomValidity('');
    }

    return isValid;
  }

  password.addEventListener('input', validatePassword);
  confirmPassword.addEventListener('input', validatePassword);

  // Form submission validation
  form.addEventListener('submit', function(e) {
    const terms = document.getElementById('terms').checked;

    if (!validatePassword()) {
      e.preventDefault();
      alert('Please ensure your password meets all requirements.');
      return false;
    }

    if (password.value !== confirmPassword.value) {
      e.preventDefault();
      alert('Passwords do not match!');
      confirmPassword.focus();
      return false;
    }

    if (!terms) {
      e.preventDefault();
      alert('Please agree to the Terms of Service and Privacy Policy.');
      return false;
    }

    // Disable submit button to prevent double submission
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating Account...';
  });

  // Email validation
  const emailInput = document.getElementById('email');
  emailInput.addEventListener('blur', function() {
    const email = this.value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (email && !emailRegex.test(email)) {
      this.classList.add('error');
      alert('Please enter a valid email address.');
    } else {
      this.classList.remove('error');
    }
  });

  // Full name validation
  const fullNameInput = document.getElementById('fullName');
  fullNameInput.addEventListener('blur', function() {
    if (this.value.trim().length < 2) {
      this.classList.add('error');
      alert('Please enter your full name (at least 2 characters).');
    } else {
      this.classList.remove('error');
    }
  });
</script>
</body>
</html>
