<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Student Feedback - Assignment Service</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="bi bi-chat-left-text"></i> Student Feedback</h2>
                    <a th:href="@{/feedback/submit}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Add Feedback
                    </a>
                </div>

                <!-- Average Rating -->
                <div th:if="${averageRating > 0}" class="card mb-4">
                    <div class="card-body text-center">
                        <h3 class="text-warning mb-2">
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></span>/5.0
                        </h3>
                        <p class="text-muted mb-0">
                            Average rating based on <span th:text="${feedbacks.size()}"></span> student feedbacks
                        </p>
                    </div>
                </div>

                <!-- Feedback List -->
                <div th:if="${feedbacks == null or feedbacks.empty}">
                    <div class="card text-center py-5">
                        <div class="card-body">
                            <i class="bi bi-chat-square-text display-1 text-muted mb-3"></i>
                            <h3>No Feedback Yet</h3>
                            <p class="text-muted">Be the first to share your experience with our service.</p>
                            <a th:href="@{/feedback/submit}" class="btn btn-primary">
                                <i class="bi bi-plus-circle"></i> Share Your Feedback
                            </a>
                        </div>
                    </div>
                </div>

                <div th:if="${feedbacks != null and !feedbacks.empty}">
                    <div class="row">
                        <div class="col-lg-8 mx-auto">
                            <div class="card">
                                <div class="card-body p-0">
                                    <div class="list-group list-group-flush">
                                        <div th:each="feedback : ${feedbacks}"
                                             class="list-group-item">
                                            <div class="d-flex w-100 justify-content-between mb-2">
                                                <h6 class="mb-1" th:text="${feedback.user.fullName}"></h6>
                                                <small class="text-muted"
                                                       th:text="${#temporals.format(feedback.createdAt, 'MMM dd, yyyy')}"></small>
                                            </div>
                                            <div class="text-warning mb-2">
                                                <i class="bi bi-star-fill"
                                                   th:each="i : ${#numbers.sequence(1, feedback.rating)}"></i>
                                                <i class="bi bi-star"
                                                   th:each="i : ${#numbers.sequence(feedback.rating + 1, 5)}"></i>
                                            </div>
                                            <p class="mb-1" th:text="${feedback.message}"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
