<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Assignment Service</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --danger-color: #e74c3c;
            --success-color: #27ae60;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(45deg, var(--danger-color), #c0392b);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .card-header i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.75rem;
        }

        .card-body {
            padding: 2rem;
        }

        .info-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 1.5rem;
            border-radius: 5px;
        }

        .info-box p {
            margin: 0;
            color: #856404;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .alert {
            border: none;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-danger {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
        }

        .form-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .password-requirements {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .password-requirements ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }

        .password-requirements li {
            color: #6c757d;
            margin: 3px 0;
        }

        .password-requirements li.valid {
            color: var(--success-color);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--danger-color), #c0392b);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(45deg, #c0392b, var(--danger-color));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .text-center {
            text-align: center;
        }

        .mt-3 {
            margin-top: 1rem;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .password-toggle {
            position: relative;
        }

        .toggle-icon {
            position: absolute;
            right: 15px;
            top: 12px;
            cursor: pointer;
            color: #6c757d;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-shield-lock"></i>
            <h2>Reset Your Password</h2>
        </div>

        <div class="card-body">
            <div class="info-box">
                <p>
                    <i class="bi bi-info-circle"></i>
                    <strong>Important:</strong> Choose a strong password that you haven't used before.
                </p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/reset-password}" method="post" id="resetForm">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3 password-toggle">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock"></i> New Password
                    </label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Enter new password"
                           minlength="6"
                           required>
                    <i class="bi bi-eye toggle-icon" id="togglePassword"></i>
                </div>

                <div class="mb-3 password-toggle">
                    <label for="confirmPassword" class="form-label">
                        <i class="bi bi-lock-fill"></i> Confirm Password
                    </label>
                    <input type="password"
                           class="form-control"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Confirm new password"
                           minlength="6"
                           required>
                    <i class="bi bi-eye toggle-icon" id="toggleConfirmPassword"></i>
                </div>

                <div class="password-requirements">
                    <strong>Password Requirements:</strong>
                    <ul>
                        <li id="length-req">At least 6 characters</li>
                        <li id="match-req">Passwords match</li>
                    </ul>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="bi bi-check-circle"></i> Reset Password
                </button>
            </form>

            <div class="text-center mt-3">
                <p style="font-size: 0.9rem; color: #6c757d;">
                    Remember your password? <a th:href="@{/login}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // Password validation
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const lengthReq = document.getElementById('length-req');
    const matchReq = document.getElementById('match-req');
    const submitBtn = document.getElementById('submitBtn');

    function validatePassword() {
        let isValid = true;

        // Check length
        if (password.value.length >= 6) {
            lengthReq.classList.add('valid');
        } else {
            lengthReq.classList.remove('valid');
            isValid = false;
        }

        // Check match
        if (password.value && confirmPassword.value && password.value === confirmPassword.value) {
            matchReq.classList.add('valid');
            confirmPassword.setCustomValidity('');
        } else {
            matchReq.classList.remove('valid');
            if (confirmPassword.value) {
                confirmPassword.setCustomValidity('Passwords do not match');
                isValid = false;
            }
        }

        submitBtn.disabled = !isValid;
    }

    password.addEventListener('input', validatePassword);
    confirmPassword.addEventListener('input', validatePassword);

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const type = password.type === 'password' ? 'text' : 'password';
        password.type = type;
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });

    document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
        const type = confirmPassword.type === 'password' ? 'text' : 'password';
        confirmPassword.type = type;
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });

    // Form submission validation
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            alert('Passwords do not match!');
        }
    });
</script>
</body>
</html>
